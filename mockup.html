<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KOGRAHIC Mockup Generator</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
  <style>
    body { margin:0; background:#111; color:#fff; text-align:center; font-family:sans-serif; }
    canvas { max-width:100%; height:auto; border:2px solid #f00; margin:20px auto; display:block; }
    button, input { padding:15px; margin:10px; font-size:16px; width:90%; max-width:300px; }
  </style>
</head>
<body>
  <h1>KOGRAHIC Mockup Generator</h1>
  <input type="file" id="upload" accept="image/*">
  <br>
  <button onclick="loadTemplate('tshirt')">T-Shirt</button>
  <button onclick="loadTemplate('hoodie')">Hoodie</button>
  <button onclick="loadTemplate('mug')">Mug</button>
  <br>
  <canvas id="canvas" width="500" height="600"></canvas>
  <br>
  <button onclick="download()">Download Mockup</button>

  <script>
    var canvas = new fabric.Canvas('canvas', { backgroundColor: '#fff' });
    var userImage;

    document.getElementById('upload').addEventListener('change', function(e) {
      var reader = new FileReader();
      reader.onload = function(event) {
        fabric.Image.fromURL(event.target.result, function(img) {
          userImage = img;
          img.scale(0.5).set({ left: 100, top: 100 });
          canvas.add(img);
          canvas.renderAll();
        });
      }
      reader.readAsDataURL(e.target.files[0]);
    });

    function loadTemplate(type) {
      var templates = {
        tshirt: 'https://i.imgur.com/8vM9p0f.png', // free transparent templates
        hoodie: 'https://i.imgur.com/4q3j1jK.png',
        mug: 'https://i.imgur.com/0l2j1jL.png'
      };
      fabric.Image.fromURL(templates[type] || templates.tshirt, function(img) {
        canvas.setBackgroundImage(img, canvas.renderAll.bind(canvas), {
          scaleX: canvas.width / img.width,
          scaleY: canvas.height / img.height
        });
      });
    }

    function download() {
      var link = document.createElement('a');
      link.download = 'kograhic-mockup.png';
      link.href = canvas.toDataURL();
      link.click();
    }

    loadTemplate('tshirt');
  </script>
</body>
</html>
